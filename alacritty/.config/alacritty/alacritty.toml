[font.normal]
family = "MesloLGS NF"
style = "Regular"

[window]
opacity = 0.7
dimensions = {columns = 120, lines = 30}

[window.padding]
x = 10
y = 10

[env]
  TERM = "xterm-256color"
  COLORTERM = "truecolor"

[terminal]

[terminal.shell]
program = "/usr/bin/tmux"
args = ["new-session", "-s", "main"]
